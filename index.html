<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Preview - Mahir Jain</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.1.0/github-markdown-dark.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <style>
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .markdown-body {
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;
            background: #161b22;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        .banner {
            text-align: center;
            padding: 12px;
            background: #238636;
            color: white;
            font-size: 14px;
            font-weight: 500;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .banner a {
            color: white;
            text-decoration: underline;
        }
        img {
            max-width: 100%;
        }
        img[src*="#gh-light-mode-only"] { display: none !important; }
        @media (prefers-color-scheme: light) {
            img[src*="#gh-dark-mode-only"] { display: none !important; }
            img[src*="#gh-light-mode-only"] { display: inline-block !important; }
        }
    </style>
</head>
<body>
    <div class="banner">
        LOCAL PREVIEW — Images from GitHub APIs won't render until published. <a href="#" onclick="location.reload()">Reload</a> after editing README.md.
    </div>
    <div class="markdown-body" id="content"></div>
    <script>
        fetch('README.md')
            .then(r => r.text())
            .then(md => {
                document.getElementById('content').innerHTML = marked.parse(md);
            })
            .catch(e => {
                document.getElementById('content').innerHTML = '<p style="color:#f85149">Error loading README.md: ' + e.message + '</p>';
            });
    </script>
</body>
</html>
